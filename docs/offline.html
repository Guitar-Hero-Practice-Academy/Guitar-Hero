<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Guitar Hero Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f4f1ea;
        color: #191919;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(540px, calc(100% - 2rem));
        border: 1px solid #d7d0c4;
        border-radius: 8px;
        background: #fffdf8;
        padding: 1.5rem;
      }
      h1 { margin-top: 0; }
      p { color: #66635f; line-height: 1.5; }
    </style>
  </head>
  <body>
    <main>
      <h1>Guitar Hero is offline</h1>
      <p>The app shell should open offline after it has loaded once online. If you see this page, open Guitar Hero once while online, then try again.</p>
    </main>
  </body>
</html>
